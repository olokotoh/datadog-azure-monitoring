name: Terraform PR

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-pr.yml"

permissions:
  id-token: write # Azure OIDC
  contents: read
  pull-requests: write # post plan comment

concurrency:
  group: terraform-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY }}
  TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY }}
  TF_VAR_azure_client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  validate:
    name: fmt / validate / lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "1.15.1"

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v4.1.1
        with:
          tflint_version: "v0.55.0"

      - name: TFLint
        run: |
          tflint --init
          tflint --recursive

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12.2982.0
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: false

  plan:
    name: plan
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "1.15.1"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=datadog-azure-monitoring.tfstate"

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8').slice(0, 60000);
            const body = `#### Terraform Plan 📖\n\`\`\`\n${plan}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
