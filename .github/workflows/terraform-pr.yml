name: Terraform PR

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-pr.yml"

permissions:
  id-token: write # Azure OIDC
  contents: read
  pull-requests: write # post plan comments

concurrency:
  group: terraform-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY }}
  TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY }}
  TF_VAR_azure_client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TF_VERSION: "1.15.1"

jobs:
  discover:
    name: discover teams
    runs-on: ubuntu-latest
    outputs:
      teams: ${{ steps.list.outputs.teams }}
    steps:
      - uses: actions/checkout@v4.2.2
      - id: list
        run: |
          teams=$(cd terraform/teams && ls -d */ | sed 's#/##' | jq -R . | jq -cs .)
          echo "teams=$teams" >> "$GITHUB_OUTPUT"
          echo "Discovered teams: $teams"

  validate:
    name: fmt / validate / lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Validate per-team root
        run: terraform init -backend=false && terraform validate

      - name: Validate integration root
        run: cd integration && terraform init -backend=false && terraform validate

      - uses: terraform-linters/setup-tflint@v4.1.1
        with:
          tflint_version: "v0.55.0"

      - name: TFLint
        run: |
          tflint --init
          tflint --recursive

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12.2982.0
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: false

  plan-integration:
    name: plan (integration)
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: terraform/integration
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=integration.tfstate"

      - name: Terraform plan
        run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/integration/plan.txt', 'utf8').slice(0, 60000);
            const body = `#### Terraform Plan — integration 📖\n\`\`\`\n${plan}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  plan-teams:
    name: plan (${{ matrix.team }})
    runs-on: ubuntu-latest
    needs: [validate, discover]
    strategy:
      fail-fast: false
      matrix:
        team: ${{ fromJson(needs.discover.outputs.teams) }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (team state)
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=teams/${{ matrix.team }}.tfstate"

      - name: Terraform plan
        run: terraform plan -no-color -input=false -var-file="teams/${{ matrix.team }}/team.tfvars" -out=tfplan 2>&1 | tee plan.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7.0.1
        env:
          TEAM: ${{ matrix.team }}
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8').slice(0, 60000);
            const body = `#### Terraform Plan — team \`${process.env.TEAM}\` 📖\n\`\`\`\n${plan}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
