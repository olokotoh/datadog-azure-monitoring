name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"

permissions:
  id-token: write # Azure OIDC
  contents: read

concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY }}
  TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY }}
  TF_VAR_azure_client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TF_VERSION: "1.15.1"

jobs:
  discover:
    name: discover teams
    runs-on: ubuntu-latest
    outputs:
      teams: ${{ steps.list.outputs.teams }}
    steps:
      - uses: actions/checkout@v4.2.2
      - id: list
        run: |
          teams=$(cd terraform/teams && ls -d */ | sed 's#/##' | jq -R . | jq -cs .)
          echo "teams=$teams" >> "$GITHUB_OUTPUT"

  apply-integration:
    name: apply (integration)
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform/integration
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=integration.tfstate"

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false

  apply-teams:
    name: apply (${{ matrix.team }})
    runs-on: ubuntu-latest
    needs: [discover, apply-integration]
    environment: production
    strategy:
      fail-fast: false
      matrix:
        team: ${{ fromJson(needs.discover.outputs.teams) }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init (team state)
        run: |
          terraform init -reconfigure \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=teams/${{ matrix.team }}.tfstate"

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false -var-file="teams/${{ matrix.team }}/team.tfvars"
