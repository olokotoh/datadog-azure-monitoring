name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"

permissions:
  id-token: write # Azure OIDC
  contents: read

concurrency:
  group: terraform-apply
  cancel-in-progress: false

env:
  TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY }}
  TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY }}
  TF_VAR_azure_client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  apply:
    name: apply
    runs-on: ubuntu-latest
    # Protected environment gates the apply (manual approval / branch rules).
    environment: production
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "1.15.1"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TFSTATE_SA }}" \
            -backend-config="container_name=${{ secrets.TFSTATE_CONTAINER }}" \
            -backend-config="key=datadog-azure-monitoring.tfstate"

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
